name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Detect Aztec version
      id: aztec-version
      run: |
        AZTEC_VERSION=$(node -p "require('./package.json').config.aztecVersion")
        echo "version=$AZTEC_VERSION" >> "$GITHUB_OUTPUT"
        echo "VERSION=$AZTEC_VERSION" >> "$GITHUB_ENV"
        echo "Aztec version is $AZTEC_VERSION"

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Install Aztec CLI
      run: |
        NON_INTERACTIVE=1 SKIP_PULL=1 bash <(curl -fsSL https://install.aztec.network)
        echo "$HOME/.aztec/bin" >> $GITHUB_PATH

    - name: Pull Aztec Docker image
      run: docker pull aztecprotocol/aztec:${{ steps.aztec-version.outputs.version }}

    - name: Verify Aztec CLI
      run: aztec --version

    - name: Start local network
      run: aztec start --local-network &

    - name: Wait for sandbox to be ready
      run: |
        echo "Waiting for Aztec sandbox at http://localhost:8080..."
        timeout 300 bash -c '
          until curl -sf -o /dev/null http://localhost:8080 2>/dev/null; do
            echo "  Still waiting..."
            sleep 5
          done
        '
        echo "Sandbox is ready!"

    - name: Install dependencies
      working-directory: ./
      run: npm install -g yarn && yarn

    - name: Install Playwright Browsers
      working-directory: ./
      run: yarn playwright install --with-deps

    - name: Build standards and contracts
      run: yarn build:ci

    - name: Deploy contracts
      run: yarn deploy-contracts

    - name: Run Playwright E2E tests
      run: yarn playwright test --project=chromium
