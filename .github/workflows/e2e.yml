name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      VITE_PROVER_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Aztec environment
        uses: defi-wonderland/aztec-ci-actions/actions/setup-aztec@dev
        with:
          start-pxe: 'true'
          run-compile: 'false'
          run-codegen: 'false'

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps

      - name: Wait for sandbox to be ready
        run: |
          echo "Waiting for Aztec sandbox at http://localhost:8080..."
          timeout 120 bash -c '
            while ! curl -s -o /dev/null http://localhost:8080 2>/dev/null; do
              echo "  Still waiting..."
              sleep 5
            done
          '
          echo "Sandbox is ready!"

      - name: Deploy contracts and build app
        run: yarn deploy-contracts && yarn build:ci

      - name: Verify test discovery
        run: |
          count=$(yarn playwright test --list --project=chromium 2>&1 | grep -c 'test') || true
          if [ "$count" -lt 1 ]; then
            echo "::error::No tests discovered — likely a broken import chain"
            yarn playwright test --list --project=chromium 2>&1 || true
            exit 1
          fi
          echo "Discovered $count test(s)"

      - name: Run Playwright E2E tests
        run: yarn playwright test --project=chromium
