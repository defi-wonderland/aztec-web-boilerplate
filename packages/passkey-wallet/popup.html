<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aztec Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
</head>
<body>
  <div id="root"></div>
  <!--
    Early message buffer: captures postMessage events that arrive before
    React mounts. The SDK sends POPUP_INIT immediately after window.open(),
    which often arrives before React's useEffect registers its listener.
    Without this buffer, the message (with the transferred MessagePort)
    is silently dropped and the popup stays on "Loading wallet...".
  -->
  <script>
    window.__earlyMessages = [];
    window.addEventListener('message', function __earlyHandler(event) {
      if (event.data && event.data.type === 'POPUP_INIT') {
        window.__earlyMessages.push(event);
        window.removeEventListener('message', __earlyHandler);
      }
    });
  </script>
  <script type="module" src="./src/popup/entry.tsx"></script>
</body>
</html>
